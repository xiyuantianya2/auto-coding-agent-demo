<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>全自动开发 · 项目管理</title>
    <style>
      :root {
        font-family: "Segoe UI", system-ui, sans-serif;
        --bg: #09090b;
        --panel: #18181b;
        --text: #fafafa;
        --muted: #a1a1aa;
        --accent: #10b981;
        --bad: #f87171;
        color-scheme: dark;
      }
      body { margin: 0; background: var(--bg); color: var(--text); line-height: 1.5; }
      main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
      h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 0.25rem; }
      .subtitle { color: var(--muted); margin: 0 0 1.5rem; font-size: 0.95rem; }

      .toolbar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
      .btn {
        background: var(--panel); color: var(--text); border: 1px solid #27272a;
        border-radius: 8px; padding: 0.5rem 1rem; cursor: pointer; font-size: 0.9rem;
        display: inline-flex; align-items: center; gap: 0.4rem;
      }
      .btn:hover:not(:disabled) { border-color: var(--accent); }
      .btn.primary { background: #14532d; border-color: var(--accent); color: #bbf7d0; font-weight: 600; }

      .projects-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
        gap: 1.25rem;
      }
      @media (max-width: 480px) { .projects-grid { grid-template-columns: 1fr; } }

      .project-card {
        background: var(--panel); border: 1px solid #27272a; border-radius: 14px;
        padding: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem;
        transition: border-color 0.2s, box-shadow 0.2s; position: relative;
      }
      .project-card:hover { border-color: #3f3f46; }
      .card-header { display: flex; align-items: center; gap: 0.75rem; }
      .card-icon {
        font-size: 2rem; line-height: 1; flex-shrink: 0; width: 48px; height: 48px;
        display: flex; align-items: center; justify-content: center;
        background: #27272a; border-radius: 12px;
      }
      .card-title { font-size: 1.15rem; font-weight: 600; margin: 0; }
      .card-framework { font-size: 0.78rem; color: var(--muted); margin: 0; }
      .card-desc { font-size: 0.9rem; color: #d4d4d8; margin: 0; line-height: 1.5; }
      .card-stats { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.25rem; }
      .stat {
        font-size: 0.78rem; padding: 0.15rem 0.5rem; border-radius: 6px; font-weight: 600;
      }
      .stat.done { background: #14532d; color: #bbf7d0; }
      .stat.pending { background: #422006; color: #fde68a; }
      .stat.total { background: #1e3a5f; color: #93c5fd; }
      .stat.unconfigured { background: #3f3f46; color: var(--muted); }
      .stat.running { background: #14532d; color: #bbf7d0; animation: pulse 1.5s infinite; }
      .stat.paused { background: #713f12; color: #fde68a; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

      .card-footer {
        display: flex; align-items: center; justify-content: space-between;
        margin-top: auto; gap: 0.5rem;
      }
      .card-link {
        font-size: 0.85rem; font-weight: 600; color: var(--accent);
        text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem;
      }
      .card-link:hover { text-decoration: underline; }
      .card-link .arrow { transition: transform 0.2s; }
      .card-link:hover .arrow { transform: translateX(3px); }

      .progress-bar {
        flex: 1; max-width: 140px; height: 6px;
        background: #27272a; border-radius: 3px; overflow: hidden;
      }
      .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }

      .btn-delete {
        font-size: 0.78rem; padding: 0.25rem 0.5rem; border-radius: 6px;
        border: 1px solid #7f1d1d; background: transparent; color: #fca5a5;
        cursor: pointer; flex-shrink: 0;
      }
      .btn-delete:hover { background: #7f1d1d; color: #fecaca; }

      /* ── Create form ── */
      .overlay {
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
        z-index: 100; align-items: center; justify-content: center;
      }
      .overlay.show { display: flex; }
      .form-card {
        background: var(--panel); border: 1px solid #27272a; border-radius: 14px;
        padding: 1.75rem; width: 90%; max-width: 460px;
      }
      .form-card h2 { margin: 0 0 1rem; font-size: 1.15rem; font-weight: 600; }
      .form-group { margin-bottom: 1rem; }
      .form-group label {
        display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.3rem;
      }
      .form-group label .required { color: var(--bad); }
      .form-group input, .form-group textarea {
        width: 100%; box-sizing: border-box;
        background: #0c0c0e; color: var(--text); border: 1px solid #27272a;
        border-radius: 8px; padding: 0.55rem 0.75rem; font-size: 0.9rem; font-family: inherit;
      }
      .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
      .form-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.25rem; }

      .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.95rem; }
      .error-msg { text-align: center; padding: 2rem; color: var(--bad); font-size: 0.9rem; }
      .footer-info {
        margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid #27272a;
        font-size: 0.82rem; color: var(--muted); line-height: 1.6;
      }
      .footer-info code {
        font-size: 0.82em; background: #27272a; padding: 0.1em 0.35em;
        border-radius: 4px; color: #d4d4d8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>全自动开发 · 项目管理</h1>
      <p class="subtitle">选择子项目，进入一键全自动开发面板。各项目独立运行，可同时开发。</p>

      <div class="toolbar">
        <button class="btn primary" onclick="showCreateForm()">+ 新增项目</button>
        <button
          class="btn"
          type="button"
          onclick="startBatchPlaywrightHeal()"
          title="需已启动 tools/auto-coding-agent；将按注册表顺序对每个含 Playwright 的项目执行自愈 E2E"
        >
          全项目 E2E 自愈（顺序）
        </button>
      </div>

      <div id="content"><div class="loading">加载项目列表…</div></div>

      <div class="footer-info">
        需已安装并登录 Cursor Agent CLI（<code>agent login</code>），建议 Node 20/22 LTS。
        各项目按自身 <code>task.json</code> 的 <code>passes: false</code> 任务顺序，独立调用 <code>agent</code> 自动实现。
        「全项目 E2E 自愈」会对每个含 Playwright 的注册项目顺序运行 <code>npm run test:e2e</code>，失败时由 agent 修复并重试（详见各项目 <code>agent.html</code> 面板）。
      </div>
    </main>

    <!-- ── Create project overlay ── -->
    <div class="overlay" id="overlay">
      <div class="form-card">
        <h2>新增项目</h2>
        <div class="form-group">
          <label>项目名称 <span class="required">*</span></label>
          <input id="newName" placeholder="如：我的新项目" />
        </div>
        <div class="form-group">
          <label>目录名 <span class="required">*</span>（将在仓库根目录下创建该文件夹）</label>
          <input id="newDir" placeholder="如：my-new-project（字母、数字、横线）" />
        </div>
        <div class="form-group">
          <label>描述</label>
          <textarea id="newDesc" rows="2" placeholder="简述项目用途（可选）"></textarea>
        </div>
        <div class="form-group">
          <label>框架</label>
          <input id="newFramework" placeholder="如：Next.js + Tailwind（可选，仅用于展示）" />
        </div>
        <div class="form-actions">
          <button class="btn" onclick="hideCreateForm()">取消</button>
          <button class="btn primary" id="btnCreate" onclick="createProject()">创建</button>
        </div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);

      function showCreateForm() {
        $("newName").value = "";
        $("newDir").value = "";
        $("newDesc").value = "";
        $("newFramework").value = "";
        $("overlay").classList.add("show");
        $("newName").focus();
      }
      function hideCreateForm() { $("overlay").classList.remove("show"); }

      $("newName").addEventListener("input", function () {
        const dirField = $("newDir");
        if (!dirField._userEdited) {
          dirField.value = this.value
            .toLowerCase()
            .replace(/[\u4e00-\u9fff]+/g, (m) => "")
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-+|-+$/g, "")
            || "";
        }
      });
      $("newDir").addEventListener("input", function () { this._userEdited = !!this.value; });

      async function createProject() {
        const name = $("newName").value.trim();
        const dir = $("newDir").value.trim();
        if (!name || !dir) { alert("请填写项目名称和目录名。"); return; }
        $("btnCreate").disabled = true;
        try {
          const r = await fetch("/api/projects/create", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name, dir,
              description: $("newDesc").value.trim(),
              framework: $("newFramework").value.trim(),
            }),
          });
          const d = await r.json();
          if (!d.ok) { alert(d.error || "创建失败"); return; }
          hideCreateForm();
          await loadProjects();
        } catch (e) {
          alert("请求失败：" + (e.message || e));
        } finally {
          $("btnCreate").disabled = false;
        }
      }

      async function deleteProject(id, name) {
        if (!confirm(`确定删除项目「${name}」？\n\n该项目的本地文件夹也将被永久删除！此操作不可撤销。`)) return;
        try {
          const r = await fetch("/api/projects/delete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id, deleteFiles: true }),
          });
          const d = await r.json();
          if (!d.ok) { alert(d.error || "删除失败"); return; }
          await loadProjects();
        } catch (e) {
          alert("请求失败：" + (e.message || e));
        }
      }

      async function startBatchPlaywrightHeal() {
        if (
          !confirm(
            "将在后台依次对每个已注册且含 Playwright 的子项目执行「自愈 E2E」（可能极耗时）。进度见运行 auto-coding-agent 的终端日志。确定？",
          )
        ) {
          return;
        }
        try {
          const r = await fetch("/api/playwright-heal/batch-start", { method: "POST" });
          const d = await r.json();
          if (!d.ok) {
            alert(d.error || "启动失败");
            return;
          }
          alert(d.message || "已启动");
        } catch (e) {
          alert("请求失败：" + (e.message || e));
        }
      }

      async function loadProjects() {
        const container = $("content");
        try {
          const r = await fetch("/api/projects");
          const d = await r.json();
          if (!d.ok) throw new Error(d.error || "加载失败");

          const projects = d.projects || [];
          if (projects.length === 0) {
            container.innerHTML = '<div class="loading" style="color:var(--muted)">暂无项目，点击上方「+ 新增项目」开始。</div>';
            return;
          }

          let html = '<div class="projects-grid">';
          for (const p of projects) {
            const pct = p.tasks.total > 0 ? Math.round((p.tasks.done / p.tasks.total) * 100) : 0;

            let statusBadge = "";
            if (p.status === "running") statusBadge = '<span class="stat running">运行中</span>';
            else if (p.status === "paused") statusBadge = '<span class="stat paused">已暂停</span>';

            const statsHtml = p.tasks.configured
              ? `<div class="card-stats">
                   ${statusBadge}
                   <span class="stat total">共 ${p.tasks.total} 个任务</span>
                   <span class="stat done">已完成 ${p.tasks.done}</span>
                   ${p.tasks.pending > 0 ? `<span class="stat pending">待办 ${p.tasks.pending}</span>` : ""}
                 </div>`
              : `<div class="card-stats">
                   ${statusBadge}
                   <span class="stat unconfigured">未配置任务（可通过面板新增）</span>
                 </div>`;

            const progressHtml = p.tasks.configured && p.tasks.total > 0
              ? `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`
              : "";

            const btnText = p.tasks.configured
              ? (p.tasks.pending > 0 ? "进入开发" : "查看详情")
              : "进入配置";

            html += `
              <div class="project-card">
                <div class="card-header">
                  <div class="card-icon">${p.icon}</div>
                  <div>
                    <h2 class="card-title">${p.name}</h2>
                    <p class="card-framework">${p.framework || p.dir}</p>
                  </div>
                </div>
                <p class="card-desc">${p.description || "暂无描述"}</p>
                ${statsHtml}
                <div class="card-footer">
                  ${progressHtml}
                  <a class="card-link" href="/agent.html?project=${encodeURIComponent(p.id)}">${btnText} <span class="arrow">&rarr;</span></a>
                  <button class="btn-delete" onclick="deleteProject('${p.id}','${p.name.replace(/'/g, "\\'")}')">删除</button>
                </div>
              </div>`;
          }
          html += "</div>";
          container.innerHTML = html;
        } catch (e) {
          container.innerHTML = `<div class="error-msg">无法加载项目列表：${e.message || e}</div>`;
        }
      }

      loadProjects();
      setInterval(loadProjects, 5000);
    </script>
  </body>
</html>
